<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martial Art — MartialGuide</title>
    <meta name="description" content="Learn about this martial art — difficulty, equipment, history, and more." />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Scroll-reveal base ─────────────────────────────────── */
        .reveal {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: none;
        }

        /* ── BREADCRUMB ─────────────────────────────────────────── */
        .breadcrumb {
            padding: 16px 24px;
            background: #fff;
            border-bottom: 1px solid #eeeeee;
        }

        .breadcrumb-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: #aaa;
            flex-wrap: wrap;
        }

        .breadcrumb a {
            color: #aaa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb a:hover {
            color: #1a1a1a;
        }

        .breadcrumb-sep {
            color: #ddd;
        }

        .breadcrumb-current {
            color: #555;
            font-weight: 500;
        }

        /* ── HERO ───────────────────────────────────────────────── */
        .art-hero {
            position: relative;
            width: 100%;
            height: clamp(280px, 45vw, 460px);
            background: #1a1a1a;
            overflow: hidden;
        }

        /* Placeholder gradient stands in for real image */
        .art-hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #2a2a2a 0%, #444 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-hero-bg-initials {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5rem, 14vw, 11rem);
            color: rgba(255, 255, 255, 0.07);
            letter-spacing: 0.05em;
            user-select: none;
        }

        /* Dark gradient overlay so text is always readable */
        .art-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.82) 0%,
                    rgba(0, 0, 0, 0.3) 50%,
                    rgba(0, 0, 0, 0.05) 100%);
        }

        .art-hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 28px 32px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Re-center within page */
        .art-hero {
            display: flex;
            justify-content: center;
        }

        .art-hero-content {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1100px;
            padding: 28px 32px;
        }

        .art-hero-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .art-hero-origin {
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .style-badge {
            font-size: 0.67rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 100px;
            flex-shrink: 0;
        }

        .badge-striking {
            background: #fff3e0;
            color: #c25c00;
        }

        .badge-grappling {
            background: #e8f4fd;
            color: #0066b3;
        }

        .badge-weapons {
            background: #fce4ec;
            color: #c2185b;
        }

        .badge-mixed {
            background: #f3e8ff;
            color: #6d28d9;
        }

        .art-hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.6rem, 7vw, 5rem);
            color: #fff;
            letter-spacing: 0.03em;
            line-height: 1;
        }

        .art-hero-tagline {
            margin-top: 8px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.55);
            max-width: 540px;
            line-height: 1.5;
        }

        /* ── QUICK STATS ────────────────────────────────────────── */
        .quick-stats {
            background: #fff;
            border-bottom: 1px solid #eeeeee;
            padding: 28px 32px;
        }

        .quick-stats-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-block-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #999;
        }

        .stat-block-bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-bar-track {
            flex: 1;
            height: 7px;
            background: #ebebeb;
            border-radius: 10px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 10px;
            width: 0;
            /* animated in by JS */
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-bar-fill.blue {
            background: #3b82f6;
        }

        .stat-bar-fill.red {
            background: #ef4444;
        }

        .stat-bar-fill.green {
            background: #22c55e;
        }

        .stat-block-value {
            font-size: 0.85rem;
            font-weight: 700;
            color: #333;
            width: 36px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ── MAIN CONTENT LAYOUT ────────────────────────────────── */
        .art-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 32px;
            align-items: start;
        }

        .art-main {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .art-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── INFO CARD ──────────────────────────────────────────── */
        .info-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 14px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-card-icon {
            width: 36px;
            height: 36px;
            background: #f2f2f2;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-card h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        /* Fighting style description */
        .style-description {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.75;
        }

        /* Equipment list */
        .equipment-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .equipment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f4f4f4;
            gap: 12px;
        }

        .equipment-item:last-child {
            border-bottom: none;
        }

        .equipment-item-name {
            font-size: 0.875rem;
            color: #333;
            font-weight: 500;
        }

        .equipment-item-cost {
            font-size: 0.875rem;
            color: #888;
            font-weight: 500;
            white-space: nowrap;
        }

        .equipment-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: #f6f6f6;
            border-radius: 8px;
            margin-top: 4px;
        }

        .equipment-total-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .equipment-total-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        /* Best For pills */
        .bestfor-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .bestfor-pill {
            font-size: 0.82rem;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 100px;
            border: 1.5px solid #e0e0e0;
            color: #bbb;
            background: #fafafa;
        }

        .bestfor-pill.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        /* History */
        .history-text {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.8;
        }

        /* Practitioners */
        .practitioners-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .practitioners-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f4f4f4;
            font-size: 0.875rem;
            color: #333;
            font-weight: 500;
        }

        .practitioners-item:last-child {
            border-bottom: none;
        }

        .practitioners-item::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1a1a1a;
            flex-shrink: 0;
        }

        /* ── SIDEBAR: COMPARE BUTTON ────────────────────────────── */
        .compare-card {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: sticky;
            top: calc(64px + 16px);
        }

        .compare-card h3 {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
        }

        .compare-card p {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.55;
        }

        .btn-compare {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #fff;
            color: #1a1a1a;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            text-decoration: none;
            padding: 11px 18px;
            border-radius: 8px;
            transition: opacity 0.2s ease, transform 0.2s ease;
            margin-top: 4px;
        }

        .btn-compare:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        /* ── RELATED ARTS ───────────────────────────────────────── */
        .related-section {
            background: #fafafa;
            border-top: 1px solid #e8e8e8;
            padding: 60px 24px;
        }

        .related-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .related-header {
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 6px;
        }

        .related-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            letter-spacing: 0.03em;
            color: #1a1a1a;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* Related card */
        .related-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .related-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.09);
        }

        .related-card-img {
            height: 130px;
            background: linear-gradient(135deg, #e2e2e2 0%, #ececec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: #c0c0c0;
            letter-spacing: 0.06em;
            position: relative;
            overflow: hidden;
        }

        .related-card-img::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 8px,
                    rgba(255, 255, 255, 0.35) 8px, rgba(255, 255, 255, 0.35) 9px);
        }

        .related-card-img span {
            position: relative;
            z-index: 1;
        }

        .related-card-body {
            padding: 14px 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .related-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .related-card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .related-stat-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .related-stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .related-stat-label {
            font-size: 0.68rem;
            font-weight: 500;
            color: #aaa;
            width: 65px;
            flex-shrink: 0;
        }

        .related-stat-track {
            flex: 1;
            height: 4px;
            background: #ebebeb;
            border-radius: 10px;
            overflow: hidden;
        }

        .related-stat-fill {
            height: 100%;
            border-radius: 10px;
        }

        .related-stat-value {
            font-size: 0.68rem;
            font-weight: 600;
            color: #999;
            width: 16px;
            text-align: right;
        }

        /* ── NOT FOUND ──────────────────────────────────────────── */
        .not-found {
            max-width: 480px;
            margin: 100px auto;
            text-align: center;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .not-found-icon {
            font-size: 3.5rem;
        }

        .not-found h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #1a1a1a;
            letter-spacing: 0.04em;
        }

        .not-found p {
            font-size: 0.95rem;
            color: #777;
            line-height: 1.6;
        }

        .not-found a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a1a1a;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            padding: 11px 22px;
            border-radius: 8px;
            margin-top: 4px;
            transition: opacity 0.2s;
        }

        .not-found a:hover {
            opacity: 0.75;
        }

        /* ── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 900px) {
            .art-body {
                grid-template-columns: 1fr;
            }

            .compare-card {
                position: static;
                order: -1;
                /* show compare card before info sections on mobile */
            }

            .quick-stats-inner {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .related-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 540px) {
            .related-grid {
                grid-template-columns: 1fr;
            }

            .art-hero-content {
                padding: 20px;
            }

            .info-card {
                padding: 20px;
            }

            .quick-stats {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div id="navbar-container"></div>

    <main id="main-content">
        <!-- Populated by JS -->
    </main>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script src="layout.js"></script>
    <script>
        /* ── Layout ─────────────────────────────────────────────── */
        injectNavbar(document.getElementById('navbar-container'));
        injectFooter(document.getElementById('footer-container'));

        /* ── Read ?id= from URL ──────────────────────────────────── */
        const params = new URLSearchParams(window.location.search);
        const artId = params.get('id');
        const art = artId ? getArtById(artId) : null;

        /* ── Update page <title> ─────────────────────────────────── */
        if (art) {
            document.title = `${art.name} — MartialGuide`;
        }

        /* ── Helpers ─────────────────────────────────────────────── */

        function badgeClass(style) {
            const map = {
                'Striking': 'badge-striking',
                'Grappling': 'badge-grappling',
                'Weapons': 'badge-weapons',
                'Mixed': 'badge-mixed',
            };
            return map[style] || 'badge-striking';
        }

        function initials(name) {
            return name.split(' ').map(w => w[0]).join('').slice(0, 3).toUpperCase();
        }

        /* ── Scroll-reveal observer ──────────────────────────────── */
        function setupReveal() {
            const els = document.querySelectorAll('.reveal');
            if (!('IntersectionObserver' in window)) {
                els.forEach(el => el.classList.add('visible'));
                return;
            }
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            els.forEach(el => obs.observe(el));
        }

        /* ── Animate stat bars after they enter the DOM ──────────── */
        function animateStatBars() {
            // Small delay so the CSS transition actually fires
            setTimeout(() => {
                document.querySelectorAll('[data-fill]').forEach(el => {
                    el.style.width = el.dataset.fill + '%';
                });
            }, 120);
        }

        /* ── Style description copy ──────────────────────────────── */
        function styleDescription(art) {
            const map = {
                'Striking':
                    `${art.name} is a striking-based discipline, meaning practitioners primarily attack using strikes — punches, kicks, knees, elbows, or combinations thereof. Matches and sparring are typically won by landing effective blows, and footwork and timing are central skills. Ground fighting is generally not a focus.`,
                'Grappling':
                    `${art.name} is a grappling-based art focused on controlling the opponent through holds, throws, takedowns, and submissions. Practitioners learn to neutralise opponents without necessarily relying on strikes, using leverage and body positioning instead of raw power.`,
                'Weapons':
                    `${art.name} incorporates weapons training as a core part of the curriculum. Practitioners learn to use, defend against, and handle traditional weapons alongside empty-hand techniques, developing coordination, distance management, and weapons awareness.`,
                'Mixed':
                    `${art.name} is a mixed system drawing techniques from multiple disciplines — typically combining striking, grappling, and situational self-defence scenarios. The emphasis is on practical, adaptable skills that work across a range of real-world situations rather than sport competition.`,
            };
            return map[art.style] || `${art.name} is a martial art originating from ${art.origin}.`;
        }

        /* ── Icon SVGs ───────────────────────────────────────────── */
        const ICONS = {
            style: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`,
            equipment: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
            bestfor: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
            history: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            people: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            compare: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="21"/><polyline points="3 8 7 12 3 16"/><polyline points="21 8 17 12 21 16"/></svg>`,
        };

        /* ── Build info card ─────────────────────────────────────── */
        function infoCard(iconKey, title, bodyHTML, delay = 0) {
            return `
        <article class="info-card reveal" style="transition-delay:${delay}ms">
          <div class="info-card-header">
            <div class="info-card-icon" aria-hidden="true">${ICONS[iconKey]}</div>
            <h2>${title}</h2>
          </div>
          ${bodyHTML}
        </article>`;
        }

        /* ── Render NOT FOUND state ──────────────────────────────── */
        function renderNotFound() {
            document.getElementById('main-content').innerHTML = `
        <div class="not-found" role="alert">
          <div class="not-found-icon" aria-hidden="true">🥋</div>
          <h2>Art Not Found</h2>
          <p>We couldn't find a martial art with that ID. Try browsing all disciplines instead.</p>
          <a href="browse.html">← Back to Browse</a>
        </div>`;
        }

        /* ── Render related art mini-card ────────────────────────── */
        function relatedCard(a) {
            const pct_d = (a.difficulty / 10) * 100;
            const pct_r = (a.injuryRisk / 10) * 100;
            return `
        <a class="related-card reveal" href="art-template.html?id=${a.id}" aria-label="${a.name}">
          <div class="related-card-img" aria-hidden="true">
            <span>${initials(a.name)}</span>
          </div>
          <div class="related-card-body">
            <div class="related-card-top">
              <span class="related-card-name">${a.name}</span>
              <span class="style-badge ${badgeClass(a.style)}">${a.style}</span>
            </div>
            <div class="related-stat-row">
              <div class="related-stat-item">
                <span class="related-stat-label">Difficulty</span>
                <div class="related-stat-track">
                  <div class="related-stat-fill blue" style="width:${pct_d}%"></div>
                </div>
                <span class="related-stat-value">${a.difficulty}</span>
              </div>
              <div class="related-stat-item">
                <span class="related-stat-label">Injury Risk</span>
                <div class="related-stat-track">
                  <div class="related-stat-fill red" style="width:${pct_r}%"></div>
                </div>
                <span class="related-stat-value">${a.injuryRisk}</span>
              </div>
            </div>
          </div>
        </a>`;
        }

        /* ── MAIN RENDER ─────────────────────────────────────────── */
        function renderArt(art) {
            const totalCost = getTotalEquipmentCost(art);
            const related = getRelatedArts(art, 3);
            const ALL_TAGS = ['Self-defense', 'Sport', 'Fitness', 'Discipline'];

            /* Equipment rows */
            const equipRows = art.equipmentList.map(e => `
        <li class="equipment-item">
          <span class="equipment-item-name">${e.item}</span>
          <span class="equipment-item-cost">~$${e.estimatedCostUSD}</span>
        </li>`).join('');

            /* Best For pills */
            const pills = ALL_TAGS.map(tag => `
        <span class="bestfor-pill ${art.bestFor.includes(tag) ? 'active' : ''}" aria-label="${tag}${art.bestFor.includes(tag) ? ' (applies)' : ''}">
          ${tag}
        </span>`).join('');

            /* Practitioners */
            const practitionerRows = art.famousPractitioners.map(p => `
        <li class="practitioners-item">${p}</li>`).join('');

            /* Related cards */
            const relatedHTML = related.length
                ? related.map(relatedCard).join('')
                : `<p style="color:#aaa;font-size:0.9rem;">No similar arts found.</p>`;

            /* ── Inject full page ── */
            document.getElementById('main-content').innerHTML = `

        <!-- BREADCRUMB -->
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <div class="breadcrumb-inner">
            <a href="index.html">Home</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <a href="browse.html">Browse</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <span class="breadcrumb-current" aria-current="page">${art.name}</span>
          </div>
        </nav>

        <!-- HERO -->
        <section class="art-hero" aria-label="${art.name} hero image">
          <div class="art-hero-bg">
            <span class="art-hero-bg-initials" aria-hidden="true">${initials(art.name)}</span>
          </div>
          <div class="art-hero-overlay" aria-hidden="true"></div>
          <div class="art-hero-content">
            <div class="art-hero-meta">
              <span class="art-hero-origin">${art.origin}</span>
              <span class="style-badge ${badgeClass(art.style)}">${art.style}</span>
            </div>
            <h1>${art.name}</h1>
            <p class="art-hero-tagline">${art.tagline}</p>
          </div>
        </section>

        <!-- QUICK STATS -->
        <div class="quick-stats reveal" aria-label="Quick stats for ${art.name}">
          <div class="quick-stats-inner">

            <div class="stat-block">
              <span class="stat-block-label">Difficulty</span>
              <div class="stat-block-bar-row">
                <div class="stat-bar-track" role="img" aria-label="Difficulty: ${art.difficulty} out of 10">
                  <div class="stat-bar-fill blue" data-fill="${(art.difficulty / 10) * 100}" style="width:0%"></div>
                </div>
                <span class="stat-block-value">${art.difficulty} / 10</span>
              </div>
            </div>

            <div class="stat-block">
              <span class="stat-block-label">Injury Risk</span>
              <div class="stat-block-bar-row">
                <div class="stat-bar-track" role="img" aria-label="Injury Risk: ${art.injuryRisk} out of 10">
                  <div class="stat-bar-fill red" data-fill="${(art.injuryRisk / 10) * 100}" style="width:0%"></div>
                </div>
                <span class="stat-block-value">${art.injuryRisk} / 10</span>
              </div>
            </div>

            <div class="stat-block">
              <span class="stat-block-label">Fitness Required</span>
              <div class="stat-block-bar-row">
                <div class="stat-bar-track" role="img" aria-label="Fitness Required: ${art.fitnessRequired} out of 10">
                  <div class="stat-bar-fill green" data-fill="${(art.fitnessRequired / 10) * 100}" style="width:0%"></div>
                </div>
                <span class="stat-block-value">${art.fitnessRequired} / 10</span>
              </div>
            </div>

          </div>
        </div>

        <!-- BODY: MAIN + SIDEBAR -->
        <div class="art-body">

          <!-- MAIN COLUMN -->
          <div class="art-main">

            ${infoCard('style', 'Fighting Style', `
              <p class="style-description">${styleDescription(art)}</p>
            `, 0)}

            ${infoCard('equipment', 'Equipment &amp; Cost', `
              <ul class="equipment-list" aria-label="Equipment list">
                ${equipRows}
              </ul>
              <div class="equipment-total">
                <span class="equipment-total-label">Estimated Total</span>
                <span class="equipment-total-value">~$${totalCost}</span>
              </div>
            `, 60)}

            ${infoCard('bestfor', 'Best For', `
              <div class="bestfor-pills" role="list" aria-label="Best for categories">
                ${pills}
              </div>
            `, 120)}

            ${infoCard('history', 'Origin &amp; History', `
              <p class="history-text">${art.history}</p>
            `, 180)}

            ${infoCard('people', 'Famous Practitioners &amp; Pop Culture', `
              <ul class="practitioners-list" aria-label="Famous practitioners">
                ${practitionerRows}
              </ul>
            `, 240)}

          </div>

          <!-- SIDEBAR -->
          <aside class="art-sidebar" aria-label="Actions">
            <div class="compare-card reveal">
              <h3>Compare ${art.name} with another art</h3>
              <p>See how ${art.name} stacks up against any other discipline — difficulty, cost, injury risk and more.</p>
              <a class="btn-compare" href="compare.html?art1=${art.id}">
                ${ICONS.compare}
                Compare Now
              </a>
            </div>
          </aside>

        </div>

        <!-- RELATED ARTS -->
        ${related.length ? `
        <section class="related-section" aria-labelledby="related-title">
          <div class="related-inner">
            <div class="related-header">
              <p class="section-label">Same Style</p>
              <h2 id="related-title">Related Martial Arts</h2>
            </div>
            <div class="related-grid">
              ${relatedHTML}
            </div>
          </div>
        </section>` : ''}
      `;

            /* ── Post-render: animate bars + reveal observer ── */
            animateStatBars();
            setupReveal();
        }

        /* ── Boot ─────────────────────────────────────────────────── */
        if (!art) {
            renderNotFound();
        } else {
            renderArt(art);
        }
    </script>
    <script src="data.js"></script>
    <script src="layout.js"></script>
</body>

</html>
